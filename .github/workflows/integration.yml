name: Integration

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mail-to-nextcloud:
    name: SMTP → MailDrop → Nextcloud
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP / Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install app dependencies
        working-directory: apps/maildrop
        run: composer install --no-dev --optimize-autoloader

      - name: Pull images
        run: docker compose pull db mail nextcloud

      - name: Start Docker stack
        # Nur die für den E2E nötigen Services – kein cron/app-init (Profile "full").
        # compose up kehrt zurück, sobald die Container laufen (kein Warten auf NC-Install).
        run: docker compose up -d db mail nextcloud

      - name: Wait for Nextcloud + MailDrop
        run: |
          set -euo pipefail

          echo "Waiting for Nextcloud install…"
          for i in $(seq 1 90); do
            status="$(curl -fsS http://127.0.0.1:8080/status.php 2>/dev/null || true)"
            if echo "$status" | grep -qE '"installed"[[:space:]]*:[[:space:]]*true'; then
              echo "Nextcloud installed after ${i} attempts"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Timeout waiting for Nextcloud"
              docker compose ps
              docker compose logs --tail 150 nextcloud db
              exit 1
            fi
            sleep 2
          done

          echo "Enabling maildrop…"
          for i in $(seq 1 30); do
            if docker compose exec -T -u www-data nextcloud php occ app:enable maildrop 2>/dev/null; then
              if docker compose exec -T -u www-data nextcloud php occ app:list --enabled 2>/dev/null | grep -q maildrop; then
                echo "maildrop enabled"
                docker compose exec -T -u www-data nextcloud php occ background:cron || true
                exit 0
              fi
            fi
            sleep 2
          done

          echo "Timeout enabling maildrop"
          docker compose logs --tail 150 nextcloud
          exit 1

      - name: Run integration test
        run: python3 tests/integration/test_mail_to_nextcloud.py

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail 200 nextcloud mail db || true
          docker compose exec -T -u www-data nextcloud php occ config:list maildrop || true
          docker compose exec -T -u www-data nextcloud tail -n 100 /var/www/html/data/nextcloud.log || true

      - name: Tear down
        if: always()
        run: docker compose down -v
